<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3RockTV: Login companion</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 10px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #039be5; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>3RockTV: Login using IPTV credentials</h2>
    <input type="text" id="tf_server_url" placeholder="Server URL">
    <input type="text" id="tf_username" placeholder="Username">
    <input type="text" id="tf_password" placeholder="Password">
    <button id="btn_submit">Login</button>

    <p id="status"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
          apiKey: "AIzaSyB77chZqaSxaoAZXzHGqhXXeWnrczgNN4Q",
          authDomain: "rocktv-b1cf5.firebaseapp.com",
          projectId: "rocktv-b1cf5",
          storageBucket: "rocktv-b1cf5.firebasestorage.app",
          messagingSenderId: "653593189256",
          appId: "1:653593189256:web:9a4e8ba64d02d51719783d",
          measurementId: "G-0JL5M9V0KJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id'); // This looks for "?id="

        const tfServerUrl = document.getElementById('tf_server_url');
        const tfUsername = document.getElementById('tf_username');
        const tfPassword = document.getElementById('tf_password');
        const btnLogin = document.getElementById('btn_submit');

        const status = document.getElementById('status');

        btnLogin.addEventListener('click', async () => {
            try {
                if(!docId){
                    status.innerText = "Missing id param";
                    return;
                }                

                const docRef = doc(db, "companion_login_sessions", docId);

                await updateDoc(docRef, {
                        status: "verifying",
                    }, { merge: true }
                );

                const serverUrl = tfServerUrl.value;
                const username = tfUsername.value;
                const password = tfPassword.value;
                
                if (!serverUrl || !username || !password) {
                    status.innerText = "Please fill in all fields";
                    await updateDoc(docRef, {
                        status: "idle",
                    }, { merge: true }
                );
                    return;
                }
                
                // Verify credentials with REST call
                status.innerText = "Verifying credentials...";
                const auth = btoa(`${username}:${password}`);
                const response = await fetch(`${serverUrl}/player_api.php?username=${username}&password=${password}`, {
                    headers: { 'Authorization': `Basic ${auth}` }
                });
                
                if (!response.ok) {
                    await updateDoc(docRef, {
                        status: "error",
                    }, { merge: true }
                );
                    throw new Error(`Server returned ${response.status}`);
                }
                
                if (docId) {
                    // Update existing document after verification
                    await updateDoc(docRef, {
                        status: "success",
                        server_url: serverUrl,
                        username: username,
                        password: password,
                        port: 8080,
                        expiry_date: 1267532630000, // Jan 1, 2030
                    }, { merge: true });
                    status.innerText = "✓ Credentials verified";
                } else {
                    status.innerText = "Missing id param";    
                }
            } catch (e) {
                console.error("Error: ", e);
                status.innerText = "Error: " + e.message;
            }
        });
    </script>
</body>
</html>
